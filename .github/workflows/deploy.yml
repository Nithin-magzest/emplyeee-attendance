name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: python -m py_compile app.py && echo "✅ app.py syntax OK"

      - name: Check key templates exist
        run: |
          for f in templates/index.html templates/admin.html templates/employee_portal.html; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Done
        run: echo "✅ All checks passed"

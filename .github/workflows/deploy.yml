name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Syntax & structure check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (for import checks)
        run: pip install --no-cache-dir -r requirements.txt

      - name: Check Python syntax
        run: |
          for f in app.py wsgi.py extensions.py \
                   utils/auth.py utils/helpers.py utils/config.py \
                   utils/email_utils.py utils/attendance_utils.py; do
            python -m py_compile "$f" && echo "✅ $f" || (echo "❌ $f syntax error" && exit 1)
          done

      - name: Check key templates exist
        run: |
          for f in \
            templates/index.html \
            templates/admin.html \
            templates/employee_portal.html \
            templates/employees.html \
            templates/employee_detail.html \
            templates/settings.html \
            templates/salary_report.html \
            templates/leave_holidays.html \
            templates/onboarding.html; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Check static assets exist
        run: |
          for f in static/shared.css static/darkmode.js static/jsQR.min.js; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Check DevOps files exist
        run: |
          for f in Containerfile entrypoint.sh wsgi.py extensions.py \
                   compose.yaml compose.prod.yaml \
                   nginx/nginx.conf.template \
                   generate_cert.py init-letsencrypt.sh deploy.sh; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Check utils package exists
        run: |
          for f in utils/__init__.py utils/auth.py utils/helpers.py \
                   utils/config.py utils/email_utils.py utils/attendance_utils.py; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

  security:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies (pip-audit)
        # Scans requirements.txt/-dev.txt against the OSV vulnerability
        # database. Fails the build on any known CVE in a resolvable
        # version — bump the affected package's floor in requirements.txt
        # to fix, don't silence this check.
        run: |
          pip install --no-cache-dir pip-audit
          python -m pip_audit -r requirements.txt -r requirements-dev.txt

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_testpass
          POSTGRES_DB: att_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d att_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASS: ci_testpass
          DB_NAME: att_test
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          FLASK_ENV: testing
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=40

  podman:
    name: Podman build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Podman image
        run: podman build -t attendance-app:ci .

      - name: Verify image starts
        run: |
          podman run -d --name test-app \
            -e DB_HOST=localhost \
            -e DB_USER=test \
            -e DB_PASS=test \
            -e DB_NAME=test \
            -e SECRET_KEY=ci-test-key \
            attendance-app:ci || true
          sleep 5
          podman logs test-app 2>&1 | tail -20
          podman rm -f test-app || true

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: podman
    # Only deploy on a direct push to master, never on pull_request runs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production   # requires approval from a repo admin before deploy runs

    steps:
      - name: Deploy via SSH
        # SSH_USER must be the "attendance" user deploy.sh creates — it runs
        # rootless Podman and owns /opt/employee-attendance directly, so no
        # sudo is needed (and it has none). Add the CI key to
        # /home/attendance/.ssh/authorized_keys on the instance.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            cd /opt/employee-attendance
            git pull origin master
            COMPOSE="podman-compose -f compose.yaml -f compose.prod.yaml"
            $COMPOSE build app
            $COMPOSE up -d --no-deps app nginx certbot redis
            podman image prune -f
            echo "Deploy complete at $(date)"

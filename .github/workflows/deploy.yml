name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Syntax & structure check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (for import checks)
        run: pip install --no-cache-dir -r requirements.txt

      - name: Check Python syntax
        run: |
          for f in app.py wsgi.py extensions.py \
                   utils/auth.py utils/helpers.py utils/config.py \
                   utils/email_utils.py utils/attendance_utils.py; do
            python -m py_compile "$f" && echo "✅ $f" || (echo "❌ $f syntax error" && exit 1)
          done

      - name: Check key templates exist
        run: |
          for f in \
            templates/index.html \
            templates/admin.html \
            templates/employee_portal.html \
            templates/employees.html \
            templates/employee_detail.html \
            templates/qrcodes.html; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Check static assets exist
        run: |
          for f in static/shared.css static/darkmode.js static/jsQR.min.js; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Check DevOps files exist
        run: |
          for f in Dockerfile entrypoint.sh wsgi.py extensions.py \
                   docker-compose.yml docker-compose.prod.yml \
                   nginx/nginx.conf.template \
                   generate_cert.py init-letsencrypt.sh deploy.sh; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Check utils package exists
        run: |
          for f in utils/__init__.py utils/auth.py utils/helpers.py \
                   utils/config.py utils/email_utils.py utils/attendance_utils.py; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_testpass
          MYSQL_DATABASE: att_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -pci_testpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt pytest pytest-cov

      - name: Run pytest
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: ci_testpass
          DB_NAME: att_test
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          FLASK_ENV: testing
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t attendance-app:ci .

      - name: Verify image starts
        run: |
          docker run -d --name test-app \
            -e DB_HOST=localhost \
            -e DB_USER=test \
            -e DB_PASS=test \
            -e DB_NAME=test \
            -e SECRET_KEY=ci-test-key \
            attendance-app:ci || true
          sleep 5
          docker logs test-app 2>&1 | tail -20
          docker rm -f test-app || true

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker
    # Only deploy on a direct push to master, never on pull_request runs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/employee-attendance
            git pull origin master
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
            $COMPOSE build app
            $COMPOSE up -d --no-deps app nginx certbot redis
            docker image prune -f
            echo "Deploy complete at $(date)"

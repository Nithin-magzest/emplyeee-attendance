name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install flask mysql-connector-python pillow flask-cors python-dotenv

      - name: Check Python syntax
        run: |
          python -m py_compile app.py
          echo "✅ Syntax OK"

      - name: Verify templates exist
        run: |
          test -f templates/index.html
          test -f templates/admin.html
          test -f templates/employee_portal.html
          echo "✅ Templates OK"

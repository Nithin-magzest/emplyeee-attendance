version: '3.9'

# Production override — use together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps app nginx certbot redis
#
# --no-deps + the explicit service list keeps the local `db` container from
# the base file out of the prod stack entirely (Compose's depends_on merge
# is a union across files, so it can't be removed by the override alone).
# The app connects to RDS instead, via DB_HOST in .env.
#
# Note: `volumes:` lists merge across files (union, not replace), so base's
# app/nginx volume entries — including the ./cert.pem/./key.pem mounts used
# for the internal app<->nginx TLS hop — still apply here unchanged; we only
# add what's new for prod below.

services:
  app:
    environment:
      DB_HOST: ${DB_HOST}

  nginx:
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

# Low-memory overlay for ~800MB-total-RAM hosts — use together with
# compose.yaml (and optionally compose.prod.yaml for RDS + a real domain):
#   podman-compose -f compose.yaml -f compose.lowmem.yaml up -d --no-deps app nginx
#
# --no-deps + omitting db/clamav/redis from the service list keeps all
# three out of this stack entirely (same technique compose.prod.yaml uses
# for db). None fit this budget:
#   - ClamAV needs 1.5-3GB just for its signature DB — MALWARE_SCAN_ENABLED
#     is set to false below instead of running it locally.
#   - PostgreSQL — point DB_HOST in .env at an external/managed instance
#     instead (see AWS_DEPLOYMENT.md's RDS setup, or any other reachable
#     PostgreSQL 16+).
#   - Redis — GUNICORN_WORKERS is forced to 1 below anyway, so there's no
#     per-worker rate-limit/WAF-counter split to fix; REDIS_HOST is
#     cleared so the app doesn't waste a startup connection attempt (and a
#     logged warning) against a host with nothing listening.
#
# Even with all three removed, this is a tight fit, not a comfortable one:
# app + nginx below total ~565MB, leaving ~235MB for the host OS and
# Podman itself on an 800MB box. That margin hasn't been tested against
# real traffic — expect to tune further (or accept occasional OOM kills).

services:
  app:
    environment:
      DB_HOST: ${DB_HOST}
      MALWARE_SCAN_ENABLED: "false"    # no clamav container in this profile — see header
      REDIS_HOST: ""                   # no redis container in this profile — see header
      GUNICORN_WORKERS: "1"            # each worker duplicates face_recognition/OpenCV/dlib in RAM
      GUNICORN_THREADS: "2"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 500mb

  nginx:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64mb

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Attendance System</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
      body {
        min-height: 100vh;
        background: #eff6ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .page-title {
        color: #1e293b;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.3px;
        margin-bottom: 6px;
      }
      .page-sub {
        color: #64748b;
        font-size: 13px;
        margin-bottom: 30px;
      }

      .cards {
        display: flex;
        gap: 22px;
        align-items: flex-start;
        width: 100%;
        max-width: 760px;
      }

      .card {
        flex: 1;
        background: #ffffff;
        border: 1px solid #dbeafe;
        border-radius: 20px;
        padding: 36px 32px;
        color: #1e293b;
        box-shadow: 0 8px 32px rgba(30,58,138,0.08);
      }

      .card-header { text-align: center; margin-bottom: 26px; }
      .card-header .icon { font-size: 44px; }
      .card-header h2 { font-size: 22px; font-weight: 700; margin-top: 10px; color: #1e293b; }
      .card-header p { font-size: 12px; color: #64748b; margin-top: 4px; }

      .divider {
        width: 1px;
        min-height: 360px;
        background: #dbeafe;
        align-self: stretch;
        border-radius: 2px;
      }

      label { display: block; text-align: left; font-size: 12px; font-weight: 600;
              text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; color: #475569; }
      input {
        width: 100%;
        padding: 11px 14px;
        border-radius: 10px;
        border: 1px solid #dbeafe;
        background: #f8fafc;
        color: #1e293b;
        font-size: 14px;
        margin-bottom: 15px;
        outline: none;
        transition: 0.2s;
      }
      input::placeholder { color: #94a3b8; }
      input:focus { border-color: #93c5fd; background: #fff; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.25s;
        margin-top: 4px;
      }
      .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(30,58,138,0.2); }
      .btn-admin    { background: #1e3a8a; }
      .btn-admin:hover { background: #1e40af; }
      .btn-employee { background: #3b82f6; }
      .btn-employee:hover { background: #2563eb; }

      .error {
        background: #fee2e2;
        border: 1px solid #fca5a5;
        padding: 10px 14px;
        border-radius: 9px;
        font-size: 13px;
        margin-bottom: 14px;
        color: #dc2626;
      }

      .back { display: block; text-align: center; margin-top: 18px;
              font-size: 12px; color: #94a3b8; text-decoration: none; }
      .back:hover { color: #3b82f6; }

      @media (max-width: 620px) {
        .cards { flex-direction: column; max-width: 380px; }
        .divider { display: none; }
      }
    </style>
  </head>
  <body>

    <div class="page-title">⚙️ Attendance Management System</div>
    <div class="page-sub">Choose your portal to continue</div>

    <div class="cards">

      <!-- ADMIN CARD -->
      <div class="card">
        <div class="card-header">
          <div class="icon">🔐</div>
          <h2>Admin Login</h2>
          <p>Manage employees &amp; attendance</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter admin username" required autofocus />

          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required />

          <button type="submit" class="btn btn-admin">Login to Admin Panel</button>
        </form>

        <a href="/" class="back">← Back to Attendance Scanner</a>
      </div>

      <!-- DIVIDER -->
      <div class="divider"></div>

      <!-- EMPLOYEE CARD -->
      <div class="card">
        <div class="card-header">
          <div class="icon">👤</div>
          <h2>Employee Login</h2>
          <p>View attendance &amp; apply for leave</p>
        </div>

        <form action="/employee_login" method="POST">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
          <label>Employee ID</label>
          <input type="text" name="emp_id" placeholder="Enter your Employee ID" required />

          <label>PIN</label>
          <input type="password" name="pin" placeholder="Enter your PIN (default: Employee ID)" required />

          <button type="submit" class="btn btn-employee">Login to My Portal</button>
        </form>

        <a href="/" class="back">← Back to Attendance Scanner</a>
      </div>

    </div>

  </body>
</html>

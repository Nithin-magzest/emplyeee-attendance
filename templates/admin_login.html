<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Attendance System</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }

      html, body { height: 100%; width: 100%; overflow: hidden; }

      .split {
        display: flex;
        height: 100vh;
        width: 100vw;
      }

      /* ── LEFT PANEL — ADMIN ── */
      .panel-admin {
        flex: 1;
        background: #1e3a8a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 56px;
        position: relative;
        overflow: hidden;
      }

      /* subtle background pattern */
      .panel-admin::before {
        content: '';
        position: absolute;
        top: -120px; right: -120px;
        width: 400px; height: 400px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
        pointer-events: none;
      }
      .panel-admin::after {
        content: '';
        position: absolute;
        bottom: -80px; left: -80px;
        width: 300px; height: 300px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
        pointer-events: none;
      }

      /* ── RIGHT PANEL — EMPLOYEE ── */
      .panel-employee {
        flex: 1;
        background: #eff6ff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 56px;
        border-left: 1px solid #dbeafe;
        position: relative;
        overflow: hidden;
      }
      .panel-employee::before {
        content: '';
        position: absolute;
        top: -100px; left: -100px;
        width: 350px; height: 350px;
        border-radius: 50%;
        background: rgba(59,130,246,0.05);
        pointer-events: none;
      }

      /* ── FORM CARD ── */
      .form-card {
        width: 100%;
        max-width: 380px;
      }

      /* ── ICONS & HEADING ── */
      .panel-icon {
        font-size: 52px;
        margin-bottom: 14px;
        display: block;
      }
      .panel-title {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 6px;
        letter-spacing: -0.3px;
      }
      .panel-admin .panel-title { color: #ffffff; }
      .panel-employee .panel-title { color: #1e293b; }

      .panel-sub {
        font-size: 13px;
        margin-bottom: 36px;
      }
      .panel-admin .panel-sub { color: rgba(255,255,255,0.6); }
      .panel-employee .panel-sub { color: #64748b; }

      /* ── INPUTS ── */
      .field-label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 7px;
      }
      .panel-admin .field-label { color: rgba(255,255,255,0.7); }
      .panel-employee .field-label { color: #475569; }

      .field-input {
        width: 100%;
        padding: 13px 16px;
        border-radius: 12px;
        font-size: 15px;
        margin-bottom: 18px;
        outline: none;
        transition: 0.2s;
      }
      .panel-admin .field-input {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #ffffff;
      }
      .panel-admin .field-input::placeholder { color: rgba(255,255,255,0.4); }
      .panel-admin .field-input:focus {
        background: rgba(255,255,255,0.15);
        border-color: rgba(255,255,255,0.5);
        box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
      }

      .panel-employee .field-input {
        background: #ffffff;
        border: 1px solid #dbeafe;
        color: #1e293b;
      }
      .panel-employee .field-input::placeholder { color: #94a3b8; }
      .panel-employee .field-input:focus {
        border-color: #93c5fd;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
      }

      /* ── BUTTONS ── */
      .btn-login {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        letter-spacing: 0.2px;
      }
      .btn-admin {
        background: #ffffff;
        color: #1e3a8a;
        margin-top: 4px;
      }
      .btn-admin:hover {
        background: #eff6ff;
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(0,0,0,0.2);
      }
      .btn-employee {
        background: #1e3a8a;
        color: #ffffff;
        margin-top: 4px;
      }
      .btn-employee:hover {
        background: #1e40af;
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(30,58,138,0.25);
      }

      /* ── ERROR ── */
      .error-box {
        background: rgba(239,68,68,0.15);
        border: 1px solid rgba(239,68,68,0.4);
        padding: 11px 15px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 18px;
        color: #fca5a5;
      }

      /* ── BACK LINK ── */
      .back-link {
        display: block;
        text-align: center;
        margin-top: 24px;
        font-size: 12px;
        text-decoration: none;
        transition: 0.2s;
      }
      .panel-admin .back-link { color: rgba(255,255,255,0.45); }
      .panel-admin .back-link:hover { color: rgba(255,255,255,0.8); }
      .panel-employee .back-link { color: #94a3b8; }
      .panel-employee .back-link:hover { color: #3b82f6; }

      /* ── SYSTEM BADGE ── */
      .sys-badge {
        position: absolute;
        top: 24px;
        left: 0; right: 0;
        text-align: center;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        pointer-events: none;
      }
      .panel-admin .sys-badge { color: rgba(255,255,255,0.35); }
      .panel-employee .sys-badge { color: #94a3b8; }

      /* ── DIVIDER LINE ── */
      .split-divider {
        width: 1px;
        background: linear-gradient(to bottom, transparent, #dbeafe 20%, #dbeafe 80%, transparent);
        flex-shrink: 0;
      }

      /* ── MOBILE ── */
      @media (max-width: 680px) {
        html, body { overflow: auto; }
        .split { flex-direction: column; height: auto; }
        .panel-admin, .panel-employee { padding: 48px 28px; }
        .split-divider { width: 100%; height: 1px;
          background: linear-gradient(to right, transparent, #dbeafe 20%, #dbeafe 80%, transparent);
        }
      }
    </style>
  </head>
  <body>
    <div class="split">

      <!-- ═══ ADMIN PANEL ═══ -->
      <div class="panel-admin">
        <div class="sys-badge">⚙️ Attendance Management System</div>
        <div class="form-card">
          <span class="panel-icon">🔐</span>
          <div class="panel-title">Admin Login</div>
          <div class="panel-sub">Manage employees, attendance &amp; reports</div>

          {% if error %}
          <div class="error-box">{{ error }}</div>
          {% endif %}

          <form method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
            <label class="field-label">Username</label>
            <input class="field-input" type="text" name="username"
                   placeholder="Enter admin username" required autofocus />

            <label class="field-label">Password</label>
            <input class="field-input" type="password" name="password"
                   placeholder="Enter password" required />

            <button type="submit" class="btn-login btn-admin">Login to Admin Panel →</button>
          </form>

          <a href="/" class="back-link">← Back to Attendance Scanner</a>
        </div>
      </div>

      <div class="split-divider"></div>

      <!-- ═══ EMPLOYEE PANEL ═══ -->
      <div class="panel-employee">
        <div class="sys-badge">⚙️ Attendance Management System</div>
        <div class="form-card">
          <span class="panel-icon">👤</span>
          <div class="panel-title">Employee Login</div>
          <div class="panel-sub">View attendance, apply for leave &amp; more</div>

          <form action="/employee_login" method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
            <label class="field-label">Employee ID</label>
            <input class="field-input" type="text" name="emp_id"
                   placeholder="e.g. EMP001" required />

            <label class="field-label">PIN</label>
            <input class="field-input" type="password" name="pin"
                   placeholder="Default PIN: your Employee ID" required />

            <button type="submit" class="btn-login btn-employee">Login to My Portal →</button>
          </form>

          <a href="/" class="back-link">← Back to Attendance Scanner</a>
        </div>
      </div>

    </div>
  </body>
</html>

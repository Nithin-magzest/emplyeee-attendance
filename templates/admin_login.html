<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Attendance System</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }

      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
        position: relative; overflow: hidden;
      }

      body::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none;
        background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      .card {
        width: 100%; max-width: 420px;
        background: rgba(255,255,255,0.06);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 28px;
        padding: 44px 40px 36px;
        position: relative; z-index: 1;
        box-shadow:
          0 32px 80px rgba(0,0,0,0.4),
          0 0 0 1px rgba(255,255,255,0.05) inset;
      }

      .logo {
        text-align: center;
        margin-bottom: 36px;
      }
      .logo-icon {
        width: 68px; height: 68px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 30px;
        margin: 0 auto 18px;
        box-shadow: 0 8px 24px rgba(59,130,246,0.4);
      }
      .logo h1 {
        font-size: 24px; font-weight: 800;
        color: #ffffff; letter-spacing: -0.3px;
        margin-bottom: 6px;
      }
      .logo p {
        font-size: 13px; color: rgba(255,255,255,0.5);
        letter-spacing: 0.3px;
      }

      .field-label {
        display: block;
        font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.7px;
        color: rgba(255,255,255,0.55);
        margin-bottom: 8px;
      }

      .field-input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        color: #ffffff;
        font-size: 15px;
        outline: none;
        transition: 0.2s;
        margin-bottom: 20px;
      }
      .field-input::placeholder { color: rgba(255,255,255,0.3); }
      .field-input:focus {
        background: rgba(255,255,255,0.12);
        border-color: rgba(99,102,241,0.7);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
      }

      .btn-login {
        width: 100%; padding: 15px;
        border: none; border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: #ffffff;
        font-size: 15px; font-weight: 700;
        cursor: pointer; transition: 0.2s;
        letter-spacing: 0.3px;
        box-shadow: 0 6px 20px rgba(59,130,246,0.4);
        margin-top: 4px;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(59,130,246,0.5);
      }
      .btn-login:active { transform: translateY(0); }

      .error-box {
        background: rgba(239,68,68,0.15);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px; font-weight: 600;
        color: #fca5a5;
        margin-bottom: 20px;
        display: flex; align-items: center; gap: 8px;
      }

      .links {
        margin-top: 20px;
        display: flex; justify-content: space-between; align-items: center;
        font-size: 12px;
      }
      .links a {
        color: rgba(255,255,255,0.4);
        text-decoration: none;
        transition: 0.2s;
      }
      .links a:hover { color: rgba(255,255,255,0.8); }
      .links .forgot { color: #93c5fd; }
      .links .forgot:hover { color: #bfdbfe; }

      .hint {
        margin-top: 24px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        font-size: 12px; color: rgba(255,255,255,0.35);
        line-height: 1.6;
      }
      .hint strong { color: rgba(255,255,255,0.55); }

      @media (max-width: 480px) {
        .card { padding: 32px 24px 28px; }
      }
    </style>
    <link rel="stylesheet" href="/static/shared.css" />
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🏢</div>
        <h1>Welcome Back</h1>
        <p>Attendance Management System</p>
      </div>

      {% if error %}
      <div class="error-box">❌ {{ error }}</div>
      {% endif %}

      <form action="/admin_login" method="POST" autocomplete="on">
        <label class="field-label">Username or Employee ID</label>
        <input class="field-input" type="text" name="identifier"
               placeholder="Enter your username or Employee ID"
               required autofocus autocomplete="username" />

        <label class="field-label">Password</label>
        <input class="field-input" type="password" name="password"
               placeholder="Enter your password"
               required autocomplete="current-password" />

        <button type="submit" class="btn-login">Sign In →</button>
      </form>

      <div class="links">
        <a href="/">← Back to Scanner</a>
        <a href="/admin_forgot_password" class="forgot">Forgot password?</a>
      </div>

      <div class="hint">
        <strong>Admins</strong> — use your admin username &amp; password.<br>
        <strong>Employees</strong> — use your Employee ID as both username &amp; default password.
      </div>
    </div>
    <script src="/static/darkmode.js"></script>
  </body>
</html>

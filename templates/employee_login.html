<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Login</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
      body {
        background: linear-gradient(135deg, #e0f2fe 0%, #ede9fe 50%, #fce7f3 100%);
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        padding: 24px; position: relative; overflow: hidden;
      }
      body::before {
        content: ''; position: fixed; inset: 0; pointer-events: none;
        background-image: radial-gradient(circle, rgba(99,102,241,0.06) 1px, transparent 1px);
        background-size: 28px 28px;
      }
      .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; animation: float 8s ease-in-out infinite; }
      .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, #93c5fd, #a5b4fc); top: -150px; right: -150px; animation-delay: 0s; }
      .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, #c4b5fd, #f9a8d4); bottom: -100px; left: -100px; animation-delay: -3s; }
      .orb3 { width: 300px; height: 300px; background: radial-gradient(circle, #7dd3fc, #86efac); top: 50%; left: 50%; animation-delay: -5s; }
      @keyframes float {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-30px) scale(1.05); }
      }
      .card {
        background: rgba(255,255,255,0.75);
        -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.9);
        border-radius: 28px; padding: 44px 38px;
        width: 100%; max-width: 390px;
        box-shadow: 0 20px 60px rgba(99,102,241,0.15), 0 4px 20px rgba(0,0,0,0.06);
        position: relative; z-index: 1;
      }
      .logo { text-align: center; margin-bottom: 32px; }
      .logo .icon { font-size: 44px; }
      .logo h1 { font-size: 22px; font-weight: 700; margin-top: 12px; color: #1e293b; }
      .logo p { font-size: 13px; color: #64748b; margin-top: 5px; }
      label {
        display: block; font-size: 11px; color: #475569;
        font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px;
      }
      input {
        width: 100%; padding: 14px 16px;
        border: 1.5px solid #e2e8f0; border-radius: 12px;
        background: #f8fafc; color: #1e293b; font-size: 15px;
        outline: none; transition: 0.2s; margin-bottom: 20px;
      }
      input::placeholder { color: #94a3b8; }
      input:focus { background: #fff; border-color: #818cf8; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
      .btn {
        width: 100%; padding: 15px; border: none; border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white; font-size: 15px; font-weight: 700;
        cursor: pointer; transition: 0.2s;
        box-shadow: 0 6px 20px rgba(99,102,241,0.35);
      }
      .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(99,102,241,0.45); }
      .error {
        background: #fee2e2; border: 1px solid #fca5a5;
        border-radius: 10px; padding: 12px 16px;
        color: #dc2626; font-size: 13px; font-weight: 600; margin-bottom: 18px;
      }
      .footer-link { text-align: center; margin-top: 22px; font-size: 13px; color: #94a3b8; }
      .footer-link a { color: #6366f1; text-decoration: none; }
      .footer-link a:hover { color: #4f46e5; }
      .footer-link.mt-sm { margin-top: 14px; }
      .footer-link.mt-xs { margin-top: 10px; }
      /* ── Dark mode ── */
      body.dark-mode { background: #0d1117 !important; }
      body.dark-mode .orb { opacity: 0.05 !important; }
      body.dark-mode .card { background: rgba(22,27,34,0.92) !important; border-color: #30363d !important; }
      body.dark-mode .logo h1 { color: #cdd9e5 !important; }
      body.dark-mode .logo p { color: #768390 !important; }
      body.dark-mode label { color: #768390 !important; }
      body.dark-mode input { background: #0d1117 !important; border-color: #30363d !important; color: #cdd9e5 !important; }
      body.dark-mode input::placeholder { color: #768390 !important; opacity: 1 !important; }
      body.dark-mode .error { background: #7f1d1d !important; border-color: #991b1b !important; color: #fca5a5 !important; }
      body.dark-mode .footer-link { color: #768390 !important; }
      body.dark-mode .footer-link a { color: #4d9de0 !important; }
    </style>
  <link rel="stylesheet" href="/static/shared.css" />
  </head>
  <body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="card">
      <div class="logo">
        <div class="icon">👤</div>
        <h1>Employee Portal</h1>
        <p>Attendance Management System</p>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form action="/employee_login" method="POST">
        <label>Employee ID</label>
        <input type="text" name="emp_id" placeholder="e.g. EMP001"
               required autofocus title="Your Employee ID" />
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password"
               required title="Your password" />
        <button type="submit" class="btn">Sign In</button>
      </form>

      <div class="footer-link mt-sm">
        <a href="/employee_forgot_password">Forgot password?</a>
      </div>
      <div class="footer-link mt-xs">
        Admin? <a href="/admin_login">Login here</a>
      </div>
    </div>
  <script src="/static/darkmode.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
      body {
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
      }
      .card {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(16px);
        border-radius: 20px; padding: 44px 38px;
        width: 100%; max-width: 400px; color: white;
        box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      }
      .logo { text-align: center; margin-bottom: 28px; }
      .logo .icon { font-size: 44px; }
      .logo h1 { font-size: 22px; font-weight: 700; margin-top: 12px; }
      .logo p { font-size: 13px; opacity: 0.6; margin-top: 6px; }
      .notice {
        background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4);
        border-radius: 10px; padding: 13px 16px;
        color: #fde68a; font-size: 13px; margin-bottom: 22px;
        display: flex; gap: 10px; align-items: flex-start;
      }
      .notice strong { display: block; margin-bottom: 3px; }
      label {
        display: block; font-size: 12px; opacity: 0.7;
        font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px;
      }
      input {
        width: 100%; padding: 12px 14px;
        border: none; border-radius: 10px;
        background: rgba(255,255,255,0.15); color: white; font-size: 15px;
        outline: none; transition: 0.2s; margin-bottom: 18px;
      }
      input::placeholder { color: rgba(255,255,255,0.4); }
      input:focus { background: rgba(255,255,255,0.25); }
      .btn {
        width: 100%; padding: 13px; border: none; border-radius: 10px;
        background: linear-gradient(90deg, #22c55e, #16a34a);
        color: white; font-size: 15px; font-weight: 700;
        cursor: pointer; transition: 0.2s;
      }
      .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(34,197,94,0.35); }
      .error {
        background: rgba(239,68,68,0.18); border: 1px solid rgba(239,68,68,0.4);
        border-radius: 9px; padding: 11px 15px;
        color: #fca5a5; font-size: 13px; margin-bottom: 18px;
      }
      .hint { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: -12px; margin-bottom: 18px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="icon">🔐</div>
        <h1>Set Your Password</h1>
        <p>Hi {{ emp_name }}, please set a new password to continue.</p>
      </div>

      <div class="notice">
        <span style="font-size:18px;">⚠️</span>
        <div>
          <strong>Action Required</strong>
          Your account is using the default password. You must set a new password before you can access the portal.
        </div>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Enter new password" required autofocus minlength="6" />
        <p class="hint">Minimum 6 characters. Do not use "1234".</p>
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Re-enter new password" required minlength="6" />
        <button type="submit" class="btn">Save Password & Continue</button>
      </form>
    </div>
  </body>
</html>

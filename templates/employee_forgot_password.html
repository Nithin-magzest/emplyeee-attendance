<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password — Employee Portal</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
    body{background:#eff6ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border:1px solid #dbeafe;border-radius:20px;padding:44px 38px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(30,58,138,0.08)}
    .icon{font-size:44px;text-align:center;margin-bottom:16px}
    h1{font-size:22px;font-weight:700;color:#1e293b;text-align:center;margin-bottom:6px}
    p.sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px}
    label{display:block;font-size:12px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px}
    input{width:100%;padding:12px 14px;border:1px solid #dbeafe;border-radius:10px;background:#f8fafc;color:#1e293b;font-size:14px;outline:none;margin-bottom:18px}
    input:focus{border-color:#93c5fd;background:#fff}
    .btn{width:100%;padding:13px;border:none;border-radius:10px;background:#1e3a8a;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
    .btn:hover{background:#1e40af}
    .error{background:#fee2e2;border:1px solid #fca5a5;border-radius:9px;padding:11px 15px;color:#dc2626;font-size:13px;margin-bottom:18px}
    .success{background:#dcfce7;border:1px solid #86efac;border-radius:9px;padding:18px;color:#15803d;font-size:14px;text-align:center}
    .back{text-align:center;margin-top:20px;font-size:13px}
    .back a{color:#3b82f6;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔑</div>
    <h1>Forgot Password?</h1>
    <p class="sub">Enter your Employee ID and registered email to receive a reset link.</p>

    {% if sent %}
      <div class="success">
        ✅ Reset link sent! Check your email inbox.<br><br>
        <small>The link expires in 1 hour.</small>
      </div>
    {% else %}
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="POST">
        <label>Employee ID</label>
        <input type="text" name="employee_id" placeholder="e.g. EMP001" required autofocus/>
        <label>Registered Email</label>
        <input type="email" name="email" placeholder="you@company.com" required/>
        <button type="submit" class="btn">Send Reset Link</button>
      </form>
    {% endif %}

    <div class="back"><a href="/admin_login">← Back to Login</a></div>
  </div>
</body>
</html>

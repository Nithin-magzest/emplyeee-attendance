<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Employee</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        height: 100vh;
        background: #eff6ff;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: #ffffff;
        border: 1px solid #dbeafe;
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(30,58,138,0.1);
        width: 380px;
        color: #1e293b;
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #1e293b;
      }

      label {
        font-size: 12px;
        color: #475569;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        display: block;
        margin-bottom: 5px;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        padding: 10px 13px;
        margin-bottom: 15px;
        border: 1px solid #dbeafe;
        border-radius: 9px;
        background: #f8fafc;
        color: #1e293b;
        outline: none;
        transition: 0.2s;
        font-size: 14px;
      }

      input:focus {
        border-color: #93c5fd;
        background: #fff;
        box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 9px;
        background: #1e3a8a;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn:hover {
        background: #1e40af;
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(30,58,138,0.2);
      }

      .back {
        display: block;
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: #94a3b8;
        text-decoration: none;
      }

      .back:hover {
        color: #3b82f6;
      }

      .preview {
        width: 100%;
        height: 180px;
        border: 2px dashed #dbeafe;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        overflow: hidden;
        color: #94a3b8;
        font-size: 14px;
        background: #f8fafc;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Employee Registration</h2>

      <form method="POST" enctype="multipart/form-data">
        <label>Name</label>
        <input
          type="text"
          name="name"
          placeholder="Enter employee name"
          required
        />

        <label>Employee ID</label>
        <input
          type="text"
          name="emp_id"
          placeholder="Enter employee ID"
          required
        />

        <label>Upload Face Image</label>

        <div class="preview" id="previewBox">Image Preview</div>

        <input
          type="file"
          name="face"
          id="fileInput"
          accept="image/*"
          required
        />

        <button type="submit" class="btn">Register Employee</button>
      </form>

      <a href="/" class="back">← Back to Home</a>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const previewBox = document.getElementById("previewBox");

      fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function () {
            previewBox.innerHTML = `<img src="${reader.result}" />`;
          };
          reader.readAsDataURL(file);
        }
      });
    </script>
  </body>
</html>

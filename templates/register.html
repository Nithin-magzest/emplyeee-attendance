<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Employee</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #43cea2, #185a9d);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: #fff;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        width: 380px;
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      label {
        font-size: 14px;
        color: #555;
        display: block;
        margin-bottom: 5px;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: #43cea2;
        box-shadow: 0 0 5px rgba(67, 206, 162, 0.5);
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #43cea2;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #2ebd8c;
      }

      .back {
        display: block;
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: #555;
        text-decoration: none;
      }

      .back:hover {
        text-decoration: underline;
      }

      .preview {
        width: 100%;
        height: 180px;
        border: 2px dashed #ccc;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        overflow: hidden;
        color: #888;
        font-size: 14px;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Employee Registration</h2>

      <form method="POST" enctype="multipart/form-data">
        <label>Name</label>
        <input
          type="text"
          name="name"
          placeholder="Enter employee name"
          required
        />

        <label>Employee ID</label>
        <input
          type="text"
          name="emp_id"
          placeholder="Enter employee ID"
          required
        />

        <label>Upload Face Image</label>

        <div class="preview" id="previewBox">Image Preview</div>

        <input
          type="file"
          name="face"
          id="fileInput"
          accept="image/*"
          required
        />

        <button type="submit" class="btn">Register Employee</button>
      </form>

      <a href="/" class="back">← Back to Home</a>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const previewBox = document.getElementById("previewBox");

      fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function () {
            previewBox.innerHTML = `<img src="${reader.result}" />`;
          };
          reader.readAsDataURL(file);
        }
      });
    </script>
  </body>
</html>

version: '3.9'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    expose:
      - "5000"
    env_file: .env
    environment:
      DB_HOST: db        # override .env so app connects to the db container
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - qrcodes:/app/static/qrcodes
      - dataset:/app/dataset

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - qrcodes:/app/static/qrcodes:ro
    depends_on:
      - app

volumes:
  mysql_data:
  qrcodes:
  dataset:
